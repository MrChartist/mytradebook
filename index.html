    <!-- Critical CSS for instant first paint -->
    <style>
      #root-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100%;
        background: #0a0f1c;
        transition: opacity 0.3s ease;
      }
      #root-loader .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(240, 112, 32, 0.2);
        border-top-color: #f07020;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* Light mode override */
      html:not(.dark) #root-loader { background: #faf8f6; }
