    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://*.supabase.in wss://*.supabase.co https://*.lovable.dev https://fonts.googleapis.com https://fonts.gstatic.com; frame-src 'self'; base-uri 'self'; form-action 'self';" />

    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet" />
    <!-- Display heading font - Space Grotesk (sharp geometric) + Mono -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "TradeBook",
      "description": "Trading journal and analytics platform for Indian markets",
      "url": "https://tradebook.mrchartist.com",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://tradebook.mrchartist.com/" },
        { "@type": "ListItem", "position": 2, "name": "Docs", "item": "https://tradebook.mrchartist.com/docs" },
        { "@type": "ListItem", "position": 3, "name": "Login", "item": "https://tradebook.mrchartist.com/login" }
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is TradeBook free?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes, TradeBook is free during beta. All core features are available at no cost." }
        },
        {
          "@type": "Question",
          "name": "Which markets does TradeBook support?",
          "acceptedAnswer": { "@type": "Answer", "text": "TradeBook is built for Indian markets — NSE, BSE, MCX — covering Equity Intraday, Positional, Futures, Options, and Commodities." }
        },
        {
          "@type": "Question",
          "name": "Can I sync trades from my broker?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes, TradeBook supports auto-sync with Dhan broker. You can also import trades via CSV." }
        }
      ]
    }
    </script>
    <!-- Critical CSS for instant first paint -->
    <style>
      #root-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100%;
        background: #0a0f1c;
        transition: opacity 0.3s ease;
      }
      #root-loader .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(240, 112, 32, 0.2);
        border-top-color: #f07020;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* Light mode override */
      html:not(.dark) #root-loader { background: #faf8f6; }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Instant loading shell — removed once React mounts -->
      <div id="root-loader" aria-label="Loading TradeBook">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
